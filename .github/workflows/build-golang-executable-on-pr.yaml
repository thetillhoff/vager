name: Build golang executable on PR

on:
  pull_request_target:

jobs:
  golang-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - linux
          - windows
          - darwin
        arch:
          - amd64
    steps:
      - uses: thetillhoff/action-golang-build@d6bf6d38e3ea7850f7e0e4dfcef72ae4d68f8a49 # v1.0.0
        with:
          OS: "${{ matrix.os }}"
          ARCH: "${{ matrix.arch }}"
