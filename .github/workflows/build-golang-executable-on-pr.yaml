name: Build golang executable on PR

on:
  pull_request_target:

jobs:
  golang-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - linux
          - windows
          - darwin
        arch:
          - amd64
    steps:
      - uses: thetillhoff/action-golang-build@63a1bfaa47f4f5c94c6b642b0723111128a9c118 # v1.0.1
        with:
          OS: "${{ matrix.os }}"
          ARCH: "${{ matrix.arch }}"
